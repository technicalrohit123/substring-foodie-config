
spring:
  application:
    name: food-service

  datasource:
    url: jdbc:mysql://localhost:3306/substring_microservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Eureka Configurations

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost


management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true

